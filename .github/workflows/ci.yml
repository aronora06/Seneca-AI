name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight runs of the same workflow for the same ref when a new
# commit lands. Saves CI minutes during back-to-back pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (typecheck + build + test)
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        # apps depend on the built dist/ from @seneca/shared. We build it
        # first so typecheck and tests in the apps see fresh artefacts.
        run: pnpm --filter @seneca/shared build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm test

      - name: Build
        # End-to-end build check. Catches any tsc / vite breakage that
        # only surfaces in the full build pipeline.
        run: pnpm build
